spring.application.name=Match_CV

# Ativa o profile "local", que carrega application-local.properties (nao versionado).
# Em outro ambiente (prod/CI), sobrescreva com --spring.profiles.active=<profile>.
spring.profiles.active=local

# Chave da Anthropic. Por padrao vem da variavel de ambiente ANTHROPIC_API_KEY;
# em desenvolvimento, application-local.properties sobrescreve com a sua chave.
# NUNCA cole a chave real aqui (este arquivo e versionado).
anthropic.api-key=${ANTHROPIC_API_KEY:}
